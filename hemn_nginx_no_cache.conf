server {
    client_max_body_size 500M;
    server_name hemnsystem.com.br www.hemnsystem.com.br;

    root /var/www/hemn_cloud;
    index index_vps.html;

    location /areadocliente/ {
        alias /var/www/hemn_cloud/;
        index index_vps.html;
        try_files $uri $uri/ =404;
        
        # KILL CACHE for HTML files
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location / {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # KILL CACHE for API calls
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        
        # Increase timeouts for long-running extractions
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/www.hemnsystem.com.br/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/www.hemnsystem.com.br/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
