server {
    listen 80;
    server_name hemnsystem.com.br www.hemnsystem.com.br;

    # Serve static files directly
    location /static/ {
        alias /var/www/hemn_cloud/static/;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # Handle prefixed static files (used in SPA)
    location /areadocliente/static/ {
        alias /var/www/hemn_cloud/static/;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # Proxy everything else to FastAPI
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Increase timeouts for long-running extractions
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
    }
}
