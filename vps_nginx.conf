server {
    listen 443 ssl default_server;
    server_name www.hemnsystem.com.br hemnsystem.com.br 129.121.45.136;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    ssl_certificate /etc/letsencrypt/live/hemnsystem.com.br/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/hemnsystem.com.br/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    listen 80 default_server;
    server_name www.hemnsystem.com.br hemnsystem.com.br 129.121.45.136;

    if ($host = www.hemnsystem.com.br) {
        return 301 https://$host$request_uri;
    } 
    if ($host = hemnsystem.com.br) {
        return 301 https://$host$request_uri;
    }
    
    # Fallback for IP access or other domains
    location / {
        return 301 https://hemnsystem.com.br$request_uri;
    }
}
