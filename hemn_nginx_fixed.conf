server {
    client_max_body_size 500M;
    server_name hemnsystem.com.br www.hemnsystem.com.br;

    # Static Files for the client area
    location /areadocliente/static/ {
        alias /var/www/hemn_cloud/static/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # API and Web Interface Proxy
    location /areadocliente/ {
        proxy_pass http://127.0.0.1:8000/; # Trailing slash strips /areadocliente/
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        
        # Timeout settings for long extractions
        proxy_read_timeout 600s;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        
        # Disable buffering for real-time progress if needed
        proxy_buffering off;
        
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Redirect root to /areadocliente/
    location / {
        return 301 https://$host/areadocliente/;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/www.hemnsystem.com.br/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/www.hemnsystem.com.br/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
